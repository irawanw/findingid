<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hasil Pencarian — finding.id</title>
<meta name="robots" content="noindex">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange:       #F97316;
    --orange-dark:  #EA580C;
    --orange-faint: rgba(249,115,22,0.06);
    --orange-light: rgba(249,115,22,0.2);
    --bg:           #FFF8F3;
    --surface:      #FFFFFF;
    --border:       rgba(249,115,22,0.15);
    --text:         #1A1A1A;
    --text-sub:     #4B4B4B;
    --text-muted:   #888;
    --radius:       12px;
    --radius-sm:    8px;
    --shadow:       0 2px 12px rgba(249,115,22,0.08);
    --shadow-hover: 0 6px 20px rgba(249,115,22,0.15);
  }

  body {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ───────────────────────────────────────────────── */
  .header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(255,248,243,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
  }
  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-link {
    text-decoration: none;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    flex-shrink: 0;
  }
  .logo-link span { color: var(--orange); }

  .search-bar {
    flex: 1;
    display: flex;
    gap: 8px;
  }
  .search-input {
    flex: 1;
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    font-family: inherit;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }
  .search-input:focus { border-color: var(--orange); }
  .search-btn {
    padding: 8px 14px;
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .search-btn:hover { background: var(--orange-dark); }

  /* ── Main ────────────────────────────────────────────────── */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  .result-header {
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .result-title {
    font-size: 13px;
    color: var(--text-sub);
  }
  .result-title strong { color: var(--text); }
  .result-count {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--orange-faint);
    border: 1px solid var(--orange-light);
    border-radius: 20px;
    padding: 3px 10px;
  }

  /* ── Product grid ─────────────────────────────────────────── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
  }
  @media (max-width: 400px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  }

  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    position: relative;
    animation: fadeIn 0.3s ease-out backwards;
  }
  .card:hover {
    border-color: var(--orange);
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-badge {
    position: absolute;
    top: 7px; left: 7px;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    z-index: 1;
  }
  .badge-best  { background: #F97316; color: #fff; }
  .badge-cheap { background: #10B981; color: #fff; }
  .badge-hot   { background: #EF4444; color: #fff; }

  .card-img {
    width: 100%;
    aspect-ratio: 1;
    background: var(--orange-faint);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    overflow: hidden;
  }
  .card-img img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }
  .card-body { padding: 8px 10px 12px; }
  .card-title {
    font-size: 10px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 5px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    color: var(--orange-dark);
    text-decoration: none;
  }
  .card-price {
    font-size: 12px;
    font-weight: 700;
    color: var(--orange-dark);
    margin-bottom: 4px;
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 9px;
    color: var(--text-muted);
    flex-wrap: wrap;
  }
  .card-stars { color: #F59E0B; letter-spacing: -1px; }
  .card-src {
    margin-left: auto;
    padding: 2px 5px;
    background: var(--orange-faint);
    color: var(--orange-dark);
    border-radius: 4px;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    border: 1px solid var(--orange-light);
  }

  /* ── Empty / loading ──────────────────────────────────────── */
  .state-box {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .state-box .icon { font-size: 40px; margin-bottom: 12px; }
  .state-box p { font-size: 13px; line-height: 1.6; }

  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--orange-light);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Load more ────────────────────────────────────────────── */
  .load-more {
    display: block;
    margin: 24px auto 0;
    padding: 10px 28px;
    background: transparent;
    border: 1.5px solid var(--orange);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    color: var(--orange-dark);
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .load-more:hover { background: var(--orange); color: #fff; }
  .load-more:disabled { opacity: 0.4; cursor: default; }

  /* ── Back to chat ─────────────────────────────────────────── */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: var(--text-muted);
    font-size: 11px;
    margin-bottom: 16px;
    transition: color 0.2s;
  }
  .back-btn:hover { color: var(--orange); }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a class="logo-link" href="/">finding<span>.</span>id</a>
    <div class="search-bar">
      <input id="searchInput" class="search-input" type="text" placeholder="Cari produk..." autocomplete="off">
      <button class="search-btn" onclick="doSearch()">Cari</button>
    </div>
  </div>
</header>

<main class="main">
  <a class="back-btn" href="/" id="backBtn">← Kembali ke chat</a>
  <div class="result-header" id="resultHeader" style="display:none">
    <div class="result-title" id="resultTitle"></div>
    <div class="result-count" id="resultCount"></div>
  </div>
  <div id="container"></div>
  <button class="load-more" id="loadMore" style="display:none" onclick="loadMore()">Muat lebih banyak</button>
</main>

<script>
const API       = '';
const PAGE_SIZE = 20;

let currentQuery = '';
let currentPage  = 1;
let totalLoaded  = 0;
let loading      = false;

// ── Session ID — persists for tab lifetime ────────────────────
const _sid = Math.random().toString(36).slice(2, 10) + Date.now().toString(36);

// ── Init ──────────────────────────────────────────────────────
(function init() {
  const q = new URLSearchParams(location.search).get('q') || '';
  document.getElementById('searchInput').value = q;
  if (q) {
    currentQuery = q;
    document.title = `${q} — finding.id`;
    document.getElementById('backBtn').href = `/?q=${encodeURIComponent(q)}`;
    fetchProducts(q, 1, false);
  } else {
    showEmpty('Masukkan kata kunci untuk mencari produk.');
  }
})();

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  history.pushState({}, '', `/hasil?q=${encodeURIComponent(q)}`);
  currentQuery = q;
  currentPage  = 1;
  totalLoaded  = 0;
  document.title = `${q} — finding.id`;
  document.getElementById('backBtn').href = `/?q=${encodeURIComponent(q)}`;
  document.getElementById('loadMore').style.display = 'none';
  fetchProducts(q, 1, false);
}

// ── Fetch & render ────────────────────────────────────────────
async function fetchProducts(query, page, append) {
  if (loading) return;
  loading = true;
  if (!append) showLoading();

  try {
    const offset = (page - 1) * PAGE_SIZE;
    const r = await fetch(`${API}/api/products?query=${encodeURIComponent(query)}&limit=${PAGE_SIZE}&offset=${offset}`);
    if (!r.ok) throw new Error('Server error');
    const { products = [] } = await r.json();

    if (!append) {
      document.getElementById('container').innerHTML = '';
      totalLoaded = 0;
    }

    if (!products.length && !append) {
      showEmpty(`Produk untuk "<strong>${esc(query)}</strong>" belum tersedia.<br>Data sedang dikumpulkan, coba lagi nanti.`);
      document.getElementById('resultHeader').style.display = 'none';
      return;
    }

    totalLoaded += products.length;
    renderGrid(products, append);

    // Update header
    const header = document.getElementById('resultHeader');
    header.style.display = 'flex';
    document.getElementById('resultTitle').innerHTML = `Hasil untuk <strong>${esc(query)}</strong>`;
    document.getElementById('resultCount').textContent = `${totalLoaded} produk`;

    // Show "load more" if page was full
    const btn = document.getElementById('loadMore');
    if (products.length === PAGE_SIZE) {
      btn.style.display = 'block';
      btn.disabled = false;
      currentPage = page + 1;
    } else {
      btn.style.display = 'none';
    }
  } catch (err) {
    if (!append) showEmpty('Gagal memuat produk. Coba lagi.');
  } finally {
    loading = false;
  }
}

function loadMore() {
  const btn = document.getElementById('loadMore');
  btn.disabled = true;
  btn.textContent = 'Memuat...';
  fetchProducts(currentQuery, currentPage, true).then(() => {
    btn.textContent = 'Muat lebih banyak';
  });
}

// ── Render grid ───────────────────────────────────────────────
function renderGrid(products, append) {
  const container = document.getElementById('container');

  // Find or create grid
  let grid = container.querySelector('.grid');
  if (!grid || !append) {
    grid = document.createElement('div');
    grid.className = 'grid';
    container.innerHTML = '';
    container.appendChild(grid);
  }

  const px = p => parseFloat(p.price) || 0;
  const sx = p => parseInt(p.sold_count) || 0;
  const rx = p => parseFloat(p.rating)  || 0;

  const withPrice = products.filter(p => px(p) > 0);
  const cheapest  = withPrice.length ? withPrice.reduce((a,b) => px(a) < px(b) ? a : b) : null;
  const withSold  = products.filter(p => sx(p) > 0);
  const hottest   = withSold.length ? withSold.reduce((a,b) => sx(b) > sx(a) ? b : a) : null;
  const score     = p => rx(p) * 0.6 + Math.log(1 + sx(p)) * 0.4;
  const pool      = withSold.length ? withSold : products;
  const best      = pool.length ? pool.reduce((a,b) => score(b) > score(a) ? b : a, pool[0]) : null;

  const existingCount = grid.children.length;

  products.forEach((p, i) => {
    const card = document.createElement('a');
    card.className = 'card';
    const goUrl = p.id
      ? `/go/${p.id}?sid=${encodeURIComponent(_sid)}&q=${encodeURIComponent(currentQuery || '')}`
      : (p.affiliate_link || p.link || '#');
    card.href      = goUrl;
    card.target    = '_blank';
    card.rel       = 'noopener noreferrer';
    card.style.animationDelay = `${(existingCount + i) * 0.04}s`;

    let badge = '';
    if (p === best)     badge = `<div class="card-badge badge-best">🏆 Terbaik</div>`;
    else if (p === cheapest) badge = `<div class="card-badge badge-cheap">💰 Termurah</div>`;
    else if (p === hottest && p !== best) badge = `<div class="card-badge badge-hot">🔥 Terlaris</div>`;

    const stars = buildStars(rx(p));
    const price = fmtPrice(p.price);
    const sold  = sx(p) > 0 ? fmtNum(sx(p)) + ' terjual' : '';
    const src   = esc((p.source || 'shop').toUpperCase());

    card.innerHTML = `
      ${badge}
      <div class="card-img">${(p.image_url || p.image)
        ? `<img src="${escA(p.image_url || p.image)}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.outerHTML='📦'">`
        : '📦'}</div>
      <div class="card-body">
        <div class="card-title">${esc(p.title || 'Produk')}</div>
        <div class="card-price">${price}</div>
        <div class="card-meta">
          <span class="card-stars">${stars}</span>
          ${sold ? `<span>${esc(sold)}</span>` : ''}
          <span class="card-src">${src}</span>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

// ── States ────────────────────────────────────────────────────
function showLoading() {
  document.getElementById('container').innerHTML = `
    <div class="state-box">
      <div class="spinner"></div>
      <p>Mencari produk...</p>
    </div>`;
}

function showEmpty(msg) {
  document.getElementById('container').innerHTML = `
    <div class="state-box">
      <div class="icon">🔍</div>
      <p>${msg}</p>
    </div>`;
}

// ── Utilities ─────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escA(s) {
  return String(s || '').replace(/"/g,'%22').replace(/'/g,'%27');
}
function fmtPrice(v) {
  const n = parseFloat(v);
  if (!n) return '—';
  return 'Rp ' + Math.round(n).toLocaleString('id-ID');
}
function fmtNum(n) {
  const v = parseInt(n) || 0;
  if (v >= 1000000) return (v/1000000).toFixed(1).replace(/\.0$/,'') + 'jt';
  if (v >= 1000)    return (v/1000).toFixed(1).replace(/\.0$/,'') + 'rb';
  return String(v);
}
function buildStars(r) {
  const v = parseFloat(r) || 0;
  if (!v) return '';
  const full = Math.round(v);
  return '★'.repeat(Math.min(full,5)) + '☆'.repeat(Math.max(0,5-full));
}
</script>
</body>
</html>
