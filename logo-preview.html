<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Finding.id Logo Preview</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Heebo:wght@900&display=swap");

:root {
  --duration: 6s;
  --wave-duration: calc(var(--duration) * 0.25);
  --text-in-delay: calc(var(--duration) * 0.275);
  --text-in-duration: calc(var(--duration) * 0.1);
  --easing: cubic-bezier(0.5, 0, 0.5, 1);
  --dot-color: #F97316;
  --dot-color-dark: #c2520a;
}

*, *:before, *:after {
  box-sizing: border-box;
  position: relative;
}

html, body {
  height: 100%;
  width: 100%;
  margin: 0;
  padding: 0;
  background: #111;
  color: white;
  font-family: "Heebo", sans-serif;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: row;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

.logo {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 0.4em;
  line-height: 1;
}

.title {
  font-size: 13vmin;
  margin: 0;
  letter-spacing: -0.02em;
}

.title .char {
  display: inline-block;
  --delay: calc(var(--text-in-delay) + (0.25s * (1 - var(--distance-percent, 0))));
  animation: text-in var(--text-in-duration) var(--easing) var(--delay) backwards;
  transform-origin: center 1em;
}

@keyframes text-in {
  0% {
    opacity: 0;
    transform: translateX(calc(-0.4em * var(--char-offset, 0))) scale(0);
  }
  90% {
    transform: translateX(0em) scale(1.05);
  }
}

/* dot container */
.dot {
  font-size: 3.5vmin;
  width: 1em;
  height: 1em;
  animation: dot var(--duration) var(--easing) both;
  flex-shrink: 0;
}

.dot-inner {
  animation: dot-inner var(--duration) var(--easing) both;
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border-radius: 50%;
  overflow: hidden;
  display: grid;
  align-items: center;
  justify-items: center;
}
.dot-inner > * { grid-area: 1 / 1; }

.dot-wave {
  width: 200%;
  height: 200%;
  fill: var(--dot-color);
  animation: wave-in var(--wave-duration) var(--easing);
  --offset-x: -110%;
}

@keyframes wave-in {
  0%   { transform: translateY(100%) translateX(var(--offset-x)); }
  70%  { transform: translateY(30%) translateX(0%); }
}

.dot-wave.background {
  fill: var(--dot-color-dark);
  animation-duration: calc(0.95 * var(--wave-duration));
  --offset-x: 110%;
}

/* "id" text fades in after dot lands */
.title-id {
  font-size: 13vmin;
  margin: 0;
  letter-spacing: -0.02em;
  animation: id-in 0.25s var(--easing) calc(var(--duration) * 0.82) backwards;
}

@keyframes id-in {
  from { opacity: 0; transform: translateX(-0.2em); }
}

@keyframes dot {
  from             { opacity: 0; transform: scale(3); }
  10%              { opacity: 1; transform: scale(3); }
  15%              { transform: scale(3) translateY(0.5em) scaleY(1.5); }
  20%              { transform: scale(1) translateY(-300%); }
  30%              { transform: translateY(1em) scaleY(0.5); }
  40%              { transform: translateY(-400%); }
  50%              { transform: translateY(-1em); }
  53%              { transform: translateY(-300%); }
  56%              { transform: translateY(-1em); }
  59%              { transform: translateY(-200%); }
  62%              { transform: translateY(1em); }
  80%, 90%, to     { transform: translateY(0); }
}

@keyframes dot-inner {
  from, 45% { transform: none; }
  70%        { transform: translateX(0); animation-timing-function: cubic-bezier(0.5,0,1,0); }
  80%        { transform: translateX(0); animation-timing-function: var(--easing); }
  83%, to    { transform: translateX(0); }
}

body:not([data-play]) *, body:not([data-play]) *:before, body:not([data-play]) *:after {
  visibility: hidden;
  animation: none !important;
}
</style>
</head>
<body>

<div class="logo">
  <h1 class="title" data-splitting>Finding</h1>
  <div class="dot">
    <div class="dot-inner">
      <svg class="dot-wave background" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
        <path d="M799.09 90s11.04 0 0 0c-80.714 0-79.621-90-200-90-120.377 0-118.607 90-200 90-81.391 0-81.215-90-200-90C80.308 0 78.68 89.29-.91 90c-6.946.062 0 0 0 0v510h800V90z"/>
      </svg>
      <svg class="dot-wave foreground" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
        <path d="M799.09 90s11.04 0 0 0c-80.714 0-79.621-90-200-90-120.377 0-118.607 90-200 90-81.391 0-81.215-90-200-90C80.308 0 78.68 89.29-.91 90c-6.946.062 0 0 0 0v510h800V90z"/>
      </svg>
    </div>
  </div>
  <h1 class="title-id">id</h1>
</div>

<script src="https://unpkg.com/splitting@1.0.6/dist/splitting.min.js"></script>
<script>
Splitting();

function replay() {
  document.body.hidden = true;
  requestAnimationFrame(() => { document.body.hidden = false; });
}

// loop every 6s
const DURATION_MS = 6000;
requestAnimationFrame(() => {
  document.body.dataset.play = true;
  setInterval(replay, DURATION_MS);
});

// also replay on click
document.body.addEventListener('click', replay);
</script>
</body>
</html>
