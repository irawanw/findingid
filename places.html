<style>
/* ============================================================
   finding.id Places — Design System
   Theme: Clumsy Orange · Monospace · Minimal · Fast
   ============================================================ */

:root {
  --bg:           #FFF8F3;
  --surface:      #FFFFFF;
  --surface-2:    #FFF3EB;
  --orange:       #F97316;
  --orange-dark:  #C2410C;
  --orange-mid:   #EA580C;
  --orange-light: #FED7AA;
  --orange-faint: #FFF7ED;
  --orange-glow:  rgba(249, 115, 22, 0.12);
  --text:         #1C1917;
  --text-sub:     #57534E;
  --text-muted:   #A8A29E;
  --border:       #F0D5C0;
  --border-focus: #F97316;
  --radius:       10px;
  --radius-sm:    6px;
  --font:         'JetBrains Mono', 'Courier New', monospace;
  --shadow:       0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(249,115,22,0.06);
  --shadow-hover: 0 4px 16px rgba(249,115,22,0.14);
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

@keyframes fadeIn  { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }
@keyframes blink   { 0%,100% { opacity:1 } 50% { opacity:0 } }
@keyframes pulseDot { 0%,100% { opacity:.3; transform:scale(.75) } 50% { opacity:1; transform:scale(1) } }
@keyframes shimmer  { 0% { background-position:-400px 0 } 100% { background-position:400px 0 } }

/* ── App shell ────────────────────────────────────────────── */
.app {
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: fadeIn 0.45s ease-out;
  padding-bottom: 60px;
}

/* ── Hero ─────────────────────────────────────────────────── */
.hero {
  text-align: center;
  padding: 72px 24px 44px;
  transition: padding 0.35s cubic-bezier(.4,0,.2,1);
  width: 100%;
}
.hero.compact { padding: 20px 24px 12px; }

.logo {
  font-size: 3.4rem;
  font-weight: 700;
  letter-spacing: -3px;
  color: var(--text);
  line-height: 1;
  margin-bottom: 10px;
  user-select: none;
}
.logo .dot { color: var(--orange); }
.logo .id  { color: var(--orange-dark); }
.logo .places { font-size: 1.8rem; color: var(--orange-dark); letter-spacing: -1px; }

.hero.compact .logo       { font-size: 1.55rem; letter-spacing: -1.5px; margin-bottom: 4px; }
.hero.compact .logo .places { font-size: 1rem; }

.tagline {
  font-size: 0.72rem;
  font-weight: 400;
  color: var(--text-muted);
  letter-spacing: 3.5px;
  text-transform: uppercase;
}
.hero.compact .tagline { font-size: 0.62rem; letter-spacing: 2.5px; }

/* ── Nav breadcrumb ───────────────────────────────────────── */
.nav-bar {
  width: 100%;
  max-width: 780px;
  padding: 8px 20px 0;
  font-size: 11px;
  color: var(--text-muted);
}
.nav-bar a { color: var(--orange); text-decoration: none; }
.nav-bar a:hover { text-decoration: underline; }

/* ── Search container ─────────────────────────────────────── */
.search-wrap {
  width: 100%;
  max-width: 780px;
  padding: 0 20px;
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg);
  padding-bottom: 10px;
  padding-top: 4px;
}

.search-box {

  align-items: center;
  background: var(--surface);
  border: 2px solid var(--border);

}
.search-box:focus-within {

}

.search-icon { color: var(--text-muted); font-size: 18px; line-height: 1; flex-shrink: 0; font-style: normal; }

.search-input {

.ld-dot:nth-child(2) { animation-delay: 0.2s; }

/* ── Places grid ──────────────────────────────────────────── */
.slide-section {

<div class="app" id="app">

<script>
// ================================================================
// finding.id Places — Frontend
// POST /api/places/search → SSE stream
// Events: status | token | replace | places | done | error
// ================================================================

const API = '';
let busy = false;
let ctrl = null;
let lastQuery = '';

// ── Entry point ───────────────────────────────────────────────
async function go() {
  const inp = document.getElementById('q');
  const q   = inp.value.trim();
  if (!q || busy) return;

  if (ctrl) ctrl.abort();
  ctrl = new AbortController();

  inp.value = '';
  busy = true;

  document.getElementById('hero').classList.add('compact');
  document.getElementById('chips').classList.add('hidden');
  document.getElementById('empty')?.remove();

  lastQuery = q;
  const chat = document.getElementById('chat');
  addUser(q, chat);

  const { aiEl, textEl, ldEl, statusEl } = addAI(chat);
  setBusy(true);

  try {
    await stream(q, textEl, ldEl, statusEl, aiEl, ctrl.signal);
  } catch(e) {
    if (e.name !== 'AbortError') {
      ldEl.style.display = 'none';
      textEl.innerHTML = '';
      textEl.style.color = '#DC2626';
      const errMsg = document.createElement('span');
      errMsg.textContent = '⚠ Gagal terhubung ke server. ';
      const retryBtn = document.createElement('button');
      retryBtn.textContent = 'Coba lagi →';
      retryBtn.style.cssText = 'background:none;border:none;color:#DC2626;text-decoration:underline;cursor:pointer;font:inherit;padding:0;';
      retryBtn.onclick = () => { inp.value = q; go(); };
      textEl.appendChild(errMsg);
      textEl.appendChild(retryBtn);
    }
  } finally {
    busy = false;
    setBusy(false);
    ctrl = null;
  }
}

// ── SSE Streaming ─────────────────────────────────────────────
async function stream(query, textEl, ldEl, statusEl, container, signal) {
  const res = await fetch(`${API}/api/places/search`, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ query }),
    signal
  });

  if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);

  const reader = res.body.getReader();
  const dec    = new TextDecoder();
  let   buf    = '';
  let   text   = '';
  let   cursor = textEl.querySelector('.cursor');

  let charQueue   = '';
  let typingTimer = null;
  const CHAR_DELAY = 2;

  function flushChar() {
    if (!charQueue.length) { typingTimer = null; return; }
    const cp = charQueue.codePointAt(0);
    const ch = String.fromCodePoint(cp);
    charQueue = charQueue.slice(ch.length);
    text += ch;
    textEl.innerHTML = mdToHtml(text);
    if (cursor) textEl.appendChild(cursor);
    typingTimer = setTimeout(flushChar, CHAR_DELAY);
  }

  function enqueue(chunk) {
    charQueue += chunk;
    if (!typingTimer) typingTimer = setTimeout(flushChar, CHAR_DELAY);
  }

  function waitTypingDone() {
    return new Promise(resolve => {
      (function check() {
        if (!charQueue.length && !typingTimer) return resolve();
        setTimeout(check, 50);
      })();
    });
  }

  let deferredDone  = null;
  let deferredError = null;

  while (true) {
    let done, value;
    try {
      ({ done, value } = await reader.read());
    } catch (_) {
      if (deferredDone) break;
      throw _;
    }
    if (done) break;

    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6).trim();
      if (!raw || raw === '[DONE]') continue;

      let ev;
      try { ev = JSON.parse(raw); } catch { continue; }

      switch (ev.type) {
        case 'status':
          ldEl.style.display = 'none';
          setStatus(statusEl, ev.message, true);
          break;

        case 'token':
          ldEl.style.display = 'none';
          enqueue(ev.content);
          break;

        case 'replace':
          charQueue = '';
          text = ev.content;
          textEl.innerHTML = mdToHtml(text);
          break;

        case 'places':
          renderPlaces(ev.data, container, ev.preliminary);
          break;

        case 'done':
          deferredDone = ev;
          break;

        case 'error':
          deferredError = ev;
          break;
      }
    }
  }

  await waitTypingDone();

  if (deferredError) {
    if (cursor) cursor.remove();
    ldEl.style.display = 'none';
    textEl.textContent = `⚠ ${deferredError.message}`;
    textEl.style.color = '#DC2626';
  } else if (deferredDone) {
    const ev = deferredDone;
    if (cursor) cursor.remove();
    setStatus(statusEl, `${ev.sources ?? 0} tempat · ${ev.duration ?? 0}ms`, false);
    statusEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ── DOM builders ──────────────────────────────────────────────
function addUser(text, chat) {
  const d = document.createElement('div');
  d.className = 'msg msg-user';
  d.innerHTML = `<div class="bubble">${esc(text)}</div>`;
  chat.appendChild(d);
  d.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function addAI(chat) {
  const d = document.createElement('div');
  d.className = 'msg msg-ai';
  d.innerHTML = `
    <div class="ai-header">
      <div class="ai-orb"></div>
      finding.id Places
    </div>
    <div class="ld" id="ld_${Date.now()}">
      <div class="ld-dots">
        <div class="ld-dot"></div>
        <div class="ld-dot"></div>
        <div class="ld-dot"></div>
      </div>
      <span>Mencari tempat...</span>
    </div>
    <div class="ai-body"></div>
    <div class="status" style="display:none"></div>
  `;
  chat.appendChild(d);

  const textEl   = d.querySelector('.ai-body');
  const ldEl     = d.querySelector('.ld');
  const statusEl = d.querySelector('.status');

  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  textEl.appendChild(cursor);

  d.scrollIntoView({ behavior: 'smooth', block: 'start' });
  return { aiEl: d, textEl, ldEl, statusEl };
}

function setStatus(el, msg, pulsing) {
  el.style.display = 'flex';
  el.innerHTML = `<div class="status-dot${pulsing ? ' pulsing' : ''}"></div><span>${esc(msg)}</span>`;
}

// ── Place cards ────────────────────────────────────────────────
function renderPlaces(places, container, preliminary) {
  if (!Array.isArray(places) || !places.length) return;

  // Remove previous section if any
  container.querySelector('.slide-section')?.remove();

  const section = document.createElement('div');
  section.className = 'slide-section';
  section.innerHTML = `
    <div class="slide-header">
      <span class="slide-label">▸ ${places.length} tempat ditemukan${preliminary ? ' (loading...)' : ''}</span>
    </div>
    <div class="places-grid" id="placesGrid"></div>
  `;

  const grid = section.querySelector('#placesGrid');

  places.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'place-card' + (p.is_chosen ? ' card-chosen' : '');
    card.style.animationDelay = `${i * 0.07}s`;

    // Pick first image
    let imgHtml = '<span>📍</span>';
    const imgs = Array.isArray(p.images) ? p.images : [];
    if (imgs.length) {
      imgHtml = `<img src="${escA(imgs[0])}" alt="${escA(p.name)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.outerHTML='📍'">`;
    }

    // Rating stars
    const stars = buildStars(p.rating);
    const reviewCount = p.reviews ? `(${fmtNum(p.reviews)})` : '';
    const ratingStr   = p.rating  ? `${parseFloat(p.rating).toFixed(1)}` : '';

    // Action buttons
    const actions = [];
    if (p.maps_url) {
      actions.push(`<a class="place-btn btn-maps" href="${escA(p.maps_url)}" target="_blank" rel="noopener noreferrer">🗺 Maps</a>`);
    }
    if (p.phone && p.has_wa) {
      const waNum = p.phone.replace(/\D/g, '').replace(/^0/, '62');
      actions.push(`<a class="place-btn btn-wa" href="https://wa.me/${escA(waNum)}" target="_blank" rel="noopener noreferrer">💬 WA</a>`);
    } else if (p.phone) {
      actions.push(`<a class="place-btn btn-web" href="tel:${escA(p.phone)}" target="_blank" rel="noopener noreferrer">📞 Telp</a>`);
    }
    if (p.website) {
      actions.push(`<a class="place-btn btn-web" href="${escA(p.website)}" target="_blank" rel="noopener noreferrer">🌐 Web</a>`);
    }

    card.innerHTML = `
      ${p.is_chosen ? `<div class="badge-ai">AI #${p.chosen_rank}</div>` : ''}
      <div class="place-img">${imgHtml}</div>
      <div class="place-body">
        <div class="place-name">${esc(p.name || '—')}</div>
        ${p.category ? `<div class="place-category">${esc(p.category)}</div>` : ''}
        ${ratingStr ? `
        <div class="place-rating">
          <span class="place-stars">${stars}</span>
          <span style="font-weight:600">${esc(ratingStr)}</span>
          ${reviewCount ? `<span class="place-rev-count">${esc(reviewCount)}</span>` : ''}
        </div>` : ''}
        ${p.address ? `<div class="place-address"><span class="place-addr-icon">📍</span>${esc(p.address)}</div>` : ''}
        ${actions.length ? `<div class="place-actions">${actions.join('')}</div>` : ''}
      </div>
    `;
    grid.appendChild(card);
  });

  container.appendChild(section);
  section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── Utilities ──────────────────────────────────────────────────
function setBusy(v) {
  const btn = document.getElementById('searchBtn');
  btn.disabled = v;
  btn.innerHTML = v
    ? `<div class="ld-dots">
         <div class="ld-dot" style="background:#fff"></div>
         <div class="ld-dot" style="background:#fff;animation-delay:.2s"></div>
         <div class="ld-dot" style="background:#fff;animation-delay:.4s"></div>
       </div>`
    : `<span>Cari</span><span>↵</span>`;
}

const CHIP_POOL = [
  'restoran Padang Jakarta','salon kecantikan Surabaya',
  'klinik gigi Bandung','hotel bintang 3 Bali',
  'barbershop Jakarta Selatan','kafe aesthetic Jogja',
  'apotek 24 jam Bekasi','gym fitness Tangerang',
];

function fill(el) {
  const inp = document.getElementById('q');
  inp.value = el.textContent;
  inp.focus();
}

(function renderChips() {
  const el = document.getElementById('chips');
  if (!el) return;
  const pool = [...CHIP_POOL].sort(() => Math.random() - 0.5).slice(0, 4);
  el.innerHTML = pool.map(kw => `<div class="chip" onclick="fill(this)">${kw}</div>`).join('');
})();

function fmtNum(n) {
  const v = parseInt(n) || 0;
  if (v >= 1000) return (v / 1000).toFixed(1).replace(/\.0$/, '') + 'rb';
  return String(v);
}

function buildStars(r) {
  const n = Math.round(Math.max(0, Math.min(5, r || 0)));
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}

function mdToHtml(s) {
  const parts = s.split(/(<a\s[^>]*>[\s\S]*?<\/a>)/);
  return parts.map((part, i) => {
    if (i % 2 === 1) return part;
    return esc(part)
      .replace(/\[([^\]\n]+)\]\((https?:\/\/[^\s)]+)\)/g,
        (_, text, url) => `<a href="${escA(url)}" target="_blank" rel="noopener noreferrer" style="color:var(--orange)">${text}</a>`)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,     '<em>$1</em>')
      .replace(/`(.+?)`/g,       '<code style="background:var(--orange-faint);padding:1px 5px;border-radius:3px">$1</code>')
      .replace(/\n/g,            '<br>');
  }).join('');
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escA(s) {
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Keyboard ───────────────────────────────────────────────────
document.getElementById('q').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); }
  if (e.key === 'Escape' && ctrl)       { ctrl.abort(); busy = false; setBusy(false); }
});

// ── Auto-focus ─────────────────────────────────────────────────
document.getElementById('q').focus();

// ── URL param auto-search ──────────────────────────────────────
(function checkUrlParam() {
  const params = new URLSearchParams(location.search);
  const q = params.get('q');
  if (q) {
    document.getElementById('q').value = q;
    setTimeout(go, 100);
  }
})();
</script>
